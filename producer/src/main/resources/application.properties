spring.application.name=producer
server.port=8081
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.datasource.url=jdbc:postgresql://localhost:5432/aqi_producers
spring.datasource.username=postgres
spring.datasource.password=Aditya
spring.datasource.driver-class-name=org.postgresql.Driver


# wait a bit to batch messages
spring.kafka.producer.properties.linger.ms=10

# max batch size (in bytes)
spring.kafka.producer.properties.batch.size=32768

# buffer memory
spring.kafka.producer.properties.buffer.memory=33554432

# compression (huge performance boost)
spring.kafka.producer.properties.compression.type=snappy